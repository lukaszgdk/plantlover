version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: plantlover
      POSTGRES_PASSWORD: plantlover
      POSTGRES_DB: plantlover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantlover"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
