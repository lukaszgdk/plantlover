name: "PlantLover - Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  OPENBAO_ADDR: "https://10.10.20.30:8200"
  OPENBAO_NAMESPACE: "HomeLab"
  OPENBAO_ROLE_ID: "7cec6a78-0b3f-80a8-7d6b-67134f8532b6"
  PVE2_HOST: "192.168.4.70"
  PLANTLOVER_CT: "270"
  PLANTLOVER_IP: "10.10.20.70"
  POSTGRES_HOST: "10.10.20.50"

jobs:
  deploy:
    name: "Deploy PlantLover (CT 270)"
    runs-on: ubuntu-latest

    steps:
      - name: "Install dependencies"
        run: |
          apt-get update && apt-get install -y curl jq sshpass openssh-client ca-certificates

      - name: "Install homelab CA certificate"
        run: |
          curl -sf http://10.10.30.100/HomeLab/hefajstos/raw/branch/main/homelab-ca.crt \
            -o /usr/local/share/ca-certificates/homelab-ca.crt
          update-ca-certificates

      - name: "Fetch secrets from OpenBao"
        env:
          OPENBAO_SECRET_ID: ${{ secrets.OPENBAO_SECRET_ID }}
        run: |
          set -euo pipefail

          echo "Authenticating to OpenBao..."
          HTTP_STATUS=$(curl -s -o /tmp/openbao_auth.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 15 \
            -X POST \
            -H "X-Vault-Namespace: ${OPENBAO_NAMESPACE}" \
            -H "Content-Type: application/json" \
            -d "{\"role_id\":\"${OPENBAO_ROLE_ID}\",\"secret_id\":\"${OPENBAO_SECRET_ID}\"}" \
            "${OPENBAO_ADDR}/v1/auth/forgejo/login")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::OpenBao AppRole auth failed — HTTP ${HTTP_STATUS}"
            cat /tmp/openbao_auth.json
            exit 1
          fi

          VAULT_TOKEN=$(jq -r '.auth.client_token // ""' /tmp/openbao_auth.json)
          [ -z "$VAULT_TOKEN" ] && { echo "::error::No client_token in response."; exit 1; }
          echo "::add-mask::$VAULT_TOKEN"

          read_secret() {
            local path="$1" dest="$2"
            local status
            status=$(curl -s -o "$dest" -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 \
              -H "X-Vault-Namespace: ${OPENBAO_NAMESPACE}" \
              -H "X-Vault-Token: ${VAULT_TOKEN}" \
              "${OPENBAO_ADDR}/v1/${path}")
            if [ "$status" != "200" ]; then
              echo "::error::Failed to read ${path} — HTTP ${status}"
              cat "$dest"
              exit 1
            fi
          }

          # SSH password for pve2 (dostep do CT przez pct exec)
          read_secret "secrets/data/homelab/proxmox/automation" /tmp/openbao_proxmox.json
          PVE2_SSH_PASSWORD=$(jq -r '.data.data.ssh_password_pve2 // ""' /tmp/openbao_proxmox.json)
          [ -z "$PVE2_SSH_PASSWORD" ] && { echo "::error::ssh_password_pve2 not found."; exit 1; }

          # Haslo do bazy plantlover
          read_secret "secrets/data/homelab/postgres/plantlover" /tmp/openbao_plantlover.json
          PLANTLOVER_DB_PASS=$(jq -r '.data.data.password // ""' /tmp/openbao_plantlover.json)
          [ -z "$PLANTLOVER_DB_PASS" ] && { echo "::error::postgres/plantlover password not found."; exit 1; }

          # Klucz PlantNet API
          read_secret "secrets/data/plantlover" /tmp/openbao_plantlover_app.json
          PLANTNET_API_KEY=$(jq -r '.data.data.PLANTNET_API_KEY // ""' /tmp/openbao_plantlover_app.json)
          [ -z "$PLANTNET_API_KEY" ] && { echo "::error::PLANTNET_API_KEY not found in secrets/data/plantlover."; exit 1; }

          for val in "$PVE2_SSH_PASSWORD" "$PLANTLOVER_DB_PASS" "$PLANTNET_API_KEY"; do
            [ -n "$val" ] && echo "::add-mask::$val"
          done

          echo "PVE2_SSH_PASSWORD=${PVE2_SSH_PASSWORD}"   >> "$GITHUB_ENV"
          echo "PLANTLOVER_DB_PASS=${PLANTLOVER_DB_PASS}" >> "$GITHUB_ENV"
          echo "PLANTNET_API_KEY=${PLANTNET_API_KEY}"     >> "$GITHUB_ENV"

      - name: "Setup SSH to pve2"
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H "${PVE2_HOST}" >> ~/.ssh/known_hosts
          ssh-keygen -t ed25519 -N "" -C "forgejo-temp-plantlover" -f ~/.ssh/id_temp
          chmod 600 ~/.ssh/id_temp
          sshpass -p "$PVE2_SSH_PASSWORD" ssh-copy-id -i ~/.ssh/id_temp.pub root@"${PVE2_HOST}"
          cat >> ~/.ssh/config << EOF
          Host pve2
            HostName ${PVE2_HOST}
            User root
            IdentityFile ~/.ssh/id_temp
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: "Pull latest code into CT 270"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c '
            set -euo pipefail
            git -C /opt/plantlover pull --ff-only origin main
          '"

      - name: "Build frontend in CT 270"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c '
            set -euo pipefail
            cd /opt/plantlover/frontend
            npm install --silent
            npm run build
          '"

      - name: "Update .env in CT 270"
        run: |
          DATABASE_URL="postgresql://plantlover:${PLANTLOVER_DB_PASS}@${POSTGRES_HOST}:5432/plantlover"
          PERENUAL_API_KEY="${{ secrets.PERENUAL_API_KEY }}"
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c \
            'printf \"DATABASE_URL=%s\nPLANTNET_API_KEY=%s\nPERENUAL_API_KEY=%s\n\" \
              \"${DATABASE_URL}\" \"${PLANTNET_API_KEY}\" \"${PERENUAL_API_KEY}\" \
              > /opt/plantlover/backend/.env && chmod 600 /opt/plantlover/backend/.env'"

      - name: "Install Python dependencies in CT 270"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c '
            set -euo pipefail
            cd /opt/plantlover/backend
            .venv/bin/pip install -q -r requirements.txt
          '"

      - name: "Run Alembic migrations in CT 270"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c '
            set -euo pipefail
            cd /opt/plantlover/backend
            .venv/bin/alembic upgrade head
          '"

      - name: "Generate missing thumbnails in CT 270"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- bash -c '
            cd /opt/plantlover/backend
            .venv/bin/python scripts/generate_thumbnails.py
          '"

      - name: "Restart PlantLover service"
        run: |
          ssh pve2 "pct exec ${PLANTLOVER_CT} -- systemctl restart plantlover"

      - name: "Health check"
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if ssh pve2 "pct exec ${PLANTLOVER_CT} -- curl -sf http://localhost:8000/health"; then
              echo "PlantLover: OK"
              echo "App:      http://${PLANTLOVER_IP}:8000"
              echo "API docs: http://${PLANTLOVER_IP}:8000/docs"
              break
            fi
            [ "$i" -eq 12 ] && { echo "::error::PlantLover did not become healthy."; exit 1; }
            echo "Attempt ${i}/12 — retrying in 5s..."
            sleep 5
          done

      - name: "Cleanup SSH credentials"
        if: always()
        run: |
          if [ -f ~/.ssh/id_temp.pub ]; then
            sshpass -p "$PVE2_SSH_PASSWORD" ssh root@"${PVE2_HOST}" \
              "sed -i '/forgejo-temp-plantlover/d' ~/.ssh/authorized_keys" 2>/dev/null || true
          fi
          rm -f ~/.ssh/id_temp ~/.ssh/id_temp.pub ~/.ssh/config /tmp/openbao_*.json || true
