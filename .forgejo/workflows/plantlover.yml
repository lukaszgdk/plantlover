name: PlantLover CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify Alembic migrations are consistent
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Placeholder so main.py startup check passes in CI without a real key
          PLANTNET_API_KEY: ci-placeholder
        run: alembic check

      # ── Frontend ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Secrets from OpenBao ─────────────────────────────────
      - name: Fetch secrets from OpenBao
        id: openbao
        env:
          OPENBAO_ROLE_ID: ${{ secrets.OPENBAO_ROLE_ID }}
          OPENBAO_SECRET_ID: ${{ secrets.OPENBAO_SECRET_ID }}
        run: |
          VAULT_TOKEN=$(curl -sf -X POST \
            -H "X-Vault-Namespace: HomeLab" \
            http://10.10.20.30:8200/v1/auth/forgejo/login \
            -d "{\"role_id\":\"$OPENBAO_ROLE_ID\",\"secret_id\":\"$OPENBAO_SECRET_ID\"}" \
            | jq -r '.auth.client_token')

          if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
            echo "ERROR: OpenBao authentication failed" >&2
            exit 1
          fi

          echo "::add-mask::$VAULT_TOKEN"

          PLANTNET_API_KEY=$(curl -sf \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "X-Vault-Namespace: HomeLab" \
            http://10.10.20.30:8200/v1/secrets/data/plantlover \
            | jq -r '.data.data.PLANTNET_API_KEY')

          if [ -z "$PLANTNET_API_KEY" ] || [ "$PLANTNET_API_KEY" = "null" ]; then
            echo "ERROR: Could not read PLANTNET_API_KEY from OpenBao" >&2
            exit 1
          fi

          echo "::add-mask::$PLANTNET_API_KEY"
          echo "PLANTNET_API_KEY=$PLANTNET_API_KEY" >> "$GITHUB_ENV"

      # ── Deploy ───────────────────────────────────────────────
      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PLANTNET_API_KEY: ${{ env.PLANTNET_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          # Copy built frontend
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/plantlover/frontend/dist/"

          # Deploy backend: pull latest, run migrations, restart service
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s << ENDSSH
            set -euo pipefail
            cd /opt/plantlover

            git pull --ff-only origin main

            export DATABASE_URL="${DATABASE_URL}"
            export PLANTNET_API_KEY="${PLANTNET_API_KEY}"

            # Run migrations
            cd backend
            alembic upgrade head

            # Restart the service (adjust to your init system)
            sudo systemctl restart plantlover
          ENDSSH

          # Scrub key
          rm -f ~/.ssh/deploy_key
